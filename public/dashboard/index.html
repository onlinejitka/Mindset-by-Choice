<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Mindset by Choice</title>
    
    <script src="/js/theme.js"></script>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .dashboard-grid { display: grid; grid-template-columns: 240px 1fr; gap: var(--space-8); margin-top: var(--space-6); }
        .timeline-nav { display: flex; flex-direction: column; gap: var(--space-2); border-right: var(--border-thin); padding-right: var(--space-4); }
        .timeline-step { padding: var(--space-2) var(--space-3); border: 1px solid transparent; text-align: left; text-transform: uppercase; font-size: var(--text-sm); font-family: var(--font-brand); color: var(--color-dimmed); transition: all var(--transition-fast); }
        .timeline-step:hover { color: var(--color-text); padding-left: var(--space-4); }
        .timeline-step.active { border: var(--border-thin); color: var(--color-text); font-weight: 700; background-color: var(--color-surface); }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } .timeline-nav { flex-direction: row; overflow-x: auto; border-right: none; border-bottom: var(--border-thin); padding-right: 0; padding-bottom: var(--space-3); } }
    </style>
</head>
<body>
    <header class="brand-header">
        <div class="container flex-between">
            <a href="/" class="brand-logo">Mindset by Choice</a>
            <nav style="display: flex; align-items: center;">
                <ul style="display: flex; gap: var(--space-4); text-transform: uppercase; font-size: var(--text-sm);">
                    <li><a href="/" style="color: var(--color-dimmed);">Home</a></li>
                    <li><a href="/blog" style="color: var(--color-dimmed);">Blog</a></li>
                    <li><a href="/dashboard" style="border-bottom: var(--border-thin);">Dashboard</a></li>
                </ul>
                <button id="theme-toggle" style="font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.05em; margin-left: var(--space-4); padding: 2px var(--space-1); border: var(--border-thin); background: none; color: inherit;">[ Day ]</button>
            </nav>
        </div>
    </header>

    <main class="container" style="flex: 1; padding-bottom: var(--space-12);">
        <div class="dashboard-grid">
            <aside class="timeline-nav">
                <button class="timeline-step active">Day 01</button>
                <button class="timeline-step">Day 02</button>
                <button class="timeline-step">Day 03</button>
                <button class="timeline-step">Day 04</button>
                <button class="timeline-step">Day 05</button>
            </aside>
            <section class="challenge-content">
                <h1 id="challenge-title" style="font-size: var(--text-xl);">Day 01: Initializing Execution</h1>
                <p style="color: var(--color-dimmed); font-weight: 300;">Welcome to the structural matrix of your attention change.</p>
                </section>
        </div>
    </main>

    <footer class="brand-footer">
        <div class="container">
            <p>© 2026 Mindset by Choice. All rights reserved.</p>
            <p>Jitka Pekárková · Primátorská 38, Prague · IČO: 87458021</p>
            <nav>
                <a href="/">Website</a>
                <a href="https://youtube.com">YouTube</a>
                <a href="https://etsy.com">Etsy Shop</a>
            </nav>
        </div>
    </footer>
</body>
</html>
